server.port=8080
spring.application.name=api-gateway
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# Route 1: Account Service (with Circuit Breaker)
spring.cloud.gateway.routes[0].id=account-route
spring.cloud.gateway.routes[0].uri=lb://account-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/accounts/**
spring.cloud.gateway.routes[0].filters[0].name=CircuitBreaker
spring.cloud.gateway.routes[0].filters[0].args.name=accountsCircuitBreaker
spring.cloud.gateway.routes[0].filters[0].args.fallbackUri=forward:/fallback/accounts

# Route 2: Loan Service (normal routing)
spring.cloud.gateway.routes[1].id=loan-route
spring.cloud.gateway.routes[1].uri=lb://loan-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/loans/**

# Route 3: Insurance Service (normal routing)
spring.cloud.gateway.routes[2].id=insurance-route
spring.cloud.gateway.routes[2].uri=lb://insurance-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/insurance/**
